name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version (e.g., v1.0.0) — only used when dispatching manually without an existing tag'
        required: false
        type: string
      aur_only:
        description: 'Only publish to AUR (skip GitHub release, homebrew, scoop, packages)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.aur_only != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ inputs.tag }}
          git push origin ${{ inputs.tag }}

      - name: Prepare AUR-only GoReleaser config
        if: inputs.aur_only == true
        run: |
          awk '/^release:/{print; print "  skip_upload: true"; next}1' .goreleaser.yml > .goreleaser.aur.yml

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: ${{ inputs.aur_only == true && 'release --clean --config .goreleaser.aur.yml --skip=snapcraft,homebrew,scoop,nfpm,announce' || 'release --clean --skip=snapcraft' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_GITHUB_TOKEN: ${{ secrets.SCOOP_GITHUB_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}