name: mdmend
description: Lint and fix Markdown files with mdmend
branding:
  icon: check-circle
  color: blue
inputs:
  args:
    description: Arguments passed to mdmend (default "check .")
    required: false
    default: check .
  version:
    description: mdmend npm package version to install
    required: false
    default: 1.0.2
  install-method:
    description: Install method (npm or go)
    required: false
    default: npm
runs:
  using: composite
  steps:
    - name: Install mdmend (npm)
      if: inputs.install-method == 'npm'
      shell: bash
      run: npm install -g @mohitmishra7/mdmend@${{ inputs.version }}
    - name: Install mdmend (go)
      if: inputs.install-method == 'go'
      shell: bash
      run: go install github.com/mohitmishra786/mdmend/cmd/mdmend@${{ inputs.version }}
    - name: Run mdmend
      shell: bash
      run: mdmend ${{ inputs.args }}